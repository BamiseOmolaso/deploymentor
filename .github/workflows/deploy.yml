name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'terraform/**'
      - '.github/workflows/deploy.yml'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    environment: production  # GitHub environment for OIDC configuration

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Package Lambda function
        run: |
          cd src
          zip -r ../lambda_function.zip .
          cd ..

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.0'

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Import existing resources (if any)
        working-directory: terraform
        continue-on-error: true
        run: |
          # Import existing CloudWatch Log Groups
          terraform import module.lambda.aws_cloudwatch_log_group.lambda /aws/lambda/deploymentor-prod 2>/dev/null || true
          terraform import module.api_gateway.aws_cloudwatch_log_group.api /aws/apigateway/deploymentor-prod 2>/dev/null || true
          
          # Import existing IAM Roles
          terraform import module.lambda.aws_iam_role.lambda deploymentor-prod-execution-role 2>/dev/null || true
          terraform import module.github_oidc.aws_iam_role.github_actions deploymentor-github-actions-role-prod 2>/dev/null || true

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan -var="environment=prod"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Get API URL
        id: api_url
        working-directory: terraform
        run: |
          API_URL=$(terraform output -raw api_gateway_url)
          echo "url=$API_URL" >> $GITHUB_OUTPUT

      - name: Health Check
        run: |
          sleep 10  # Wait for API to be ready
          curl -f "${{ steps.api_url.outputs.url }}/health" || exit 1

