name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'terraform/**'
      - '.github/workflows/deploy.yml'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    environment: production  # GitHub environment for OIDC configuration

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Package Lambda function
        run: |
          cd src
          zip -r ../lambda_function.zip .
          cd ..

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.0'

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan -var="environment=prod" || terraform plan -out=tfplan -var="environment=prod" -refresh=false

      - name: Terraform Apply
        working-directory: terraform
        continue-on-error: true
        run: terraform apply -auto-approve tfplan || terraform apply -auto-approve -var="environment=prod" -refresh=false

      - name: Get API URL
        id: api_url
        working-directory: terraform
        run: |
          API_URL=$(terraform output -raw api_gateway_url)
          echo "url=$API_URL" >> $GITHUB_OUTPUT

      - name: Health Check
        run: |
          sleep 10  # Wait for API to be ready
          curl -f "${{ steps.api_url.outputs.url }}/health" || exit 1

