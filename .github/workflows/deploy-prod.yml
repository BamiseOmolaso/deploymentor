name: Deploy Prod

on:
  push:
    branches: [prod]
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  verify-staging:
    name: Verify Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Smoke Test Staging
        run: |
          ./scripts/smoke-test.sh staging

  deploy:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: verify-staging
    environment:
      name: production
      url: ${{ steps.get-url.outputs.api_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Package Lambda function
        run: |
          echo "📦 Installing dependencies..."
          pip install -r requirements.txt -t package/

          echo "📦 Packaging Lambda with dependencies..."
          cd package
          zip -r ../lambda_function.zip .
          cd ..

          echo "📦 Adding source code..."
          zip -r lambda_function.zip src/

          echo "✅ Package size: $(du -sh lambda_function.zip | cut -f1)"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.6'

      - name: Clear any stale Terraform state lock
        run: |
          echo "🔍 Checking for stale state lock..."
          LOCK_EXISTS=$(aws s3 ls s3://deploymentor-terraform-state/deploymentor/prod/terraform.tfstate.tflock 2>/dev/null && echo "EXISTS" || echo "NONE")

          if [ "$LOCK_EXISTS" = "EXISTS" ]; then
            echo "⚠️  Stale lock found — clearing it"
            aws s3 rm s3://deploymentor-terraform-state/deploymentor/prod/terraform.tfstate.tflock
            echo "✅ Lock cleared"
          else
            echo "✅ No stale lock found"
          fi

      - name: Terraform Init
        working-directory: terraform/environments/prod
        run: terraform init -input=false

      - name: Import existing resources (if any)
        working-directory: terraform/environments/prod
        continue-on-error: true
        run: ../../../scripts/terraform-import-existing.sh prod

      - name: Terraform Plan
        working-directory: terraform/environments/prod
        run: terraform plan -var="environment=prod" -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/prod
        run: terraform apply -var="environment=prod" -auto-approve tfplan

      - name: Get API URL
        id: get-url
        working-directory: terraform/environments/prod
        run: |
          API_URL=$(terraform output -raw api_gateway_url)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

  verify-prod:
    name: Verify Prod
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Smoke Test Prod
        run: |
          ./scripts/smoke-test.sh prod

      - name: Fail on smoke test failure
        if: failure()
        run: |
          echo "⚠️ Prod smoke tests failed — consider rollback" && exit 1

