<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeployMentor</title>
  <script src="config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 min-h-screen font-sans antialiased">
  <div class="max-w-2xl mx-auto px-4 py-8 sm:px-6">
    <header class="mb-8">
      <h1 class="text-2xl font-bold text-gray-900">DeployMentor</h1>
      <p class="text-gray-600 mt-1">Analyze failed GitHub Actions runs instantly</p>
    </header>

    <form id="analyze-form" class="space-y-4 mb-8">
      <div>
        <label for="api-key" class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
        <input type="password" id="api-key" name="api-key"
          placeholder="Your DeployMentor API key"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
          autocomplete="off">
      </div>
      <div>
        <label for="repo" class="block text-sm font-medium text-gray-700 mb-1">Repository</label>
        <input type="text" id="repo" name="repo"
          placeholder="owner/repo e.g. BamiseOmolaso/deploymentor"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
      </div>
      <div>
        <label for="run-id" class="block text-sm font-medium text-gray-700 mb-1">Run ID</label>
        <input type="text" id="run-id" name="run-id"
          placeholder="GitHub Actions run ID e.g. 22816309320"
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
      </div>
      <button type="submit" id="analyze-btn"
        class="w-full sm:w-auto px-4 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed">
        Analyze
      </button>
    </form>

    <div id="loading" class="hidden mb-8 p-4 border border-gray-200 rounded-md bg-gray-50">
      <p class="text-gray-600">Analyzing run…</p>
    </div>

    <div id="error" class="hidden mb-8 p-4 border border-red-200 rounded-md bg-red-50">
      <p class="text-red-700 font-medium" id="error-message"></p>
    </div>

    <section id="results" class="hidden space-y-4">
      <div class="flex items-center gap-3 flex-wrap">
        <span id="status-badge" class="inline-flex items-center px-2.5 py-0.5 rounded text-sm font-medium"></span>
        <span class="text-gray-600" id="workflow-info"></span>
      </div>
      <div id="result-details" class="border border-gray-200 rounded-md p-4 bg-gray-50 space-y-3"></div>
    </section>
  </div>

  <div class="mt-12 pt-8 border-t border-gray-200">
    <h2 class="text-lg font-semibold text-gray-900 mb-1">
      Request API Access
    </h2>
    <p class="text-sm text-gray-500 mb-6">
      Don't have an API key yet? Request access below.
      We'll review and send your key within 24 hours.
    </p>
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLScm-Uc8wQ_IPhJF-q609C05yOvi6zBgbMtIY8FVLOyg8isPEg/viewform?embedded=true"
      width="100%"
      height="664"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      class="rounded-lg border border-gray-200">
      Loading form...
    </iframe>
  </div>

  <script>
    (function () {
      const form = document.getElementById('analyze-form');
      const loading = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const errorMessage = document.getElementById('error-message');
      const results = document.getElementById('results');
      const resultDetails = document.getElementById('result-details');
      const statusBadge = document.getElementById('status-badge');
      const workflowInfo = document.getElementById('workflow-info');
      const analyzeBtn = document.getElementById('analyze-btn');

      function stripAnsi(text) {
        if (typeof text !== 'string') return '';
        return text.replace(/\x1b\[[0-9;]*m/g, '');
      }

      function showLoading() {
        loading.classList.remove('hidden');
        errorEl.classList.add('hidden');
        results.classList.add('hidden');
        analyzeBtn.disabled = true;
      }

      function hideLoading() {
        loading.classList.add('hidden');
        analyzeBtn.disabled = false;
      }

      function showError(msg) {
        errorEl.classList.remove('hidden');
        errorMessage.textContent = msg;
        results.classList.add('hidden');
      }

      function hideError() {
        errorEl.classList.add('hidden');
      }

      function showResults(data) {
        hideError();
        results.classList.remove('hidden');

        const analysis = data.analysis || {};
        const failed = analysis.failed === true;
        const conclusion = data.conclusion || 'unknown';

        statusBadge.textContent = conclusion === 'failure' ? 'FAILED' : 'PASSED';
        statusBadge.className = 'inline-flex items-center px-2.5 py-0.5 rounded text-sm font-medium ' +
          (conclusion === 'failure' ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800');

        workflowInfo.textContent = (data.workflow_name || 'Workflow') + ' · Run #' + (data.workflow_id ?? '');

        let html = '';
        if (failed && analysis.root_cause) {
          const rc = analysis.root_cause;
          html += '<p class="text-sm text-gray-700"><strong>Failed job:</strong> ' + (rc.job_name || '—') + '</p>';
          const steps = rc.step_analyses || [];
          const failedStep = steps.find(function (s) { return s.conclusion === 'failure' || s.is_failed; }) || steps[0];
          if (failedStep) {
            html += '<p class="text-sm text-gray-700"><strong>Failed step:</strong> ' + (failedStep.step_name || '—') + '</p>';
            if (failedStep.error_type) {
              html += '<p class="text-sm text-gray-700"><span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-amber-100 text-amber-800">' + failedStep.error_type + '</span></p>';
            }
            if (failedStep.error_message) {
              const clean = stripAnsi(failedStep.error_message);
              html += '<div class="mt-2"><p class="text-sm font-medium text-gray-700 mb-1">Error message</p><pre class="font-mono text-xs p-3 bg-gray-800 text-gray-100 rounded overflow-x-auto max-h-48 overflow-y-auto">' + escapeHtml(clean) + '</pre></div>';
            }
          }
        }
        const suggestions = analysis.suggestions || [];
        if (suggestions.length) {
          html += '<div class="mt-3"><p class="text-sm font-medium text-gray-700 mb-1">Suggestions</p><ul class="list-disc list-inside text-sm text-gray-700 space-y-1">';
          suggestions.forEach(function (s) {
            html += '<li>' + escapeHtml(s) + '</li>';
          });
          html += '</ul></div>';
        }
        if (!html) {
          html = '<p class="text-sm text-gray-600">No failure details available.</p>';
        }
        resultDetails.innerHTML = html;
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const apiKey = document.getElementById('api-key').value.trim();
        const repoInput = document.getElementById('repo').value.trim();
        const runIdInput = document.getElementById('run-id').value.trim();

        if (!apiKey) {
          showError('Please enter your API key.');
          return;
        }
        if (!repoInput) {
          showError('Please enter repository (owner/repo).');
          return;
        }
        const parts = repoInput.split('/').map(function (p) { return p.trim(); });
        if (parts.length < 2 || !parts[0] || !parts[1]) {
          showError('Repository must be in the form owner/repo.');
          return;
        }
        const owner = parts[0];
        const repo = parts[1];
        const runId = runIdInput ? parseInt(runIdInput, 10) : NaN;
        if (!runIdInput || isNaN(runId)) {
          showError('Please enter a valid run ID (number).');
          return;
        }

        const baseUrl = (typeof CONFIG !== 'undefined' && CONFIG.apiUrl) ? CONFIG.apiUrl.replace(/\/$/, '') : '';
        if (!baseUrl || baseUrl === 'REPLACE_WITH_API_URL') {
          showError('API URL is not configured. Deploy the frontend via CI/CD or set CONFIG.apiUrl.');
          return;
        }

        showLoading();
        fetch(baseUrl + '/analyze', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey
          },
          body: JSON.stringify({ owner: owner, repo: repo, run_id: runId })
        })
          .then(function (res) {
            return res.json().then(function (body) {
              if (!res.ok) {
                throw new Error(body.error || body.message || 'Request failed');
              }
              return body;
            });
          })
          .then(function (data) {
            hideLoading();
            showResults(data);
          })
          .catch(function (err) {
            hideLoading();
            showError(err.message || 'Analysis failed.');
          });
      });
    })();
  </script>
</body>
</html>
