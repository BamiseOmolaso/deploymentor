name: Deploy Prod

on:
  push:
    branches: [prod]
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  verify-staging:
    name: Verify Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Smoke Test Staging
        run: |
          ./scripts/smoke-test.sh staging

  deploy:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify-staging
    environment:
      name: production
      url: ${{ steps.get-url.outputs.api_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Package Lambda function
        run: |
          echo "📦 Installing dependencies..."
          pip install -r requirements.txt -t package/

          echo "📦 Packaging Lambda with dependencies..."
          cd package
          zip -r ../lambda_function.zip .
          cd ..

          echo "📦 Adding source code..."
          zip -r lambda_function.zip src/

          echo "✅ Package size: $(du -sh lambda_function.zip | cut -f1)"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.6'

      - name: Clear any stale Terraform state lock
        run: |
          echo "🔍 Checking for stale state lock..."
          LOCK_EXISTS=$(aws s3 ls s3://deploymentor-terraform-state/deploymentor/prod/terraform.tfstate.tflock 2>/dev/null && echo "EXISTS" || echo "NONE")

          if [ "$LOCK_EXISTS" = "EXISTS" ]; then
            echo "⚠️  Stale lock found — clearing it"
            aws s3 rm s3://deploymentor-terraform-state/deploymentor/prod/terraform.tfstate.tflock
            echo "✅ Lock cleared"
          else
            echo "✅ No stale lock found"
          fi

      - name: Terraform Init
        working-directory: terraform/environments/prod
        run: terraform init -input=false

      - name: Import existing resources (if any)
        working-directory: terraform/environments/prod
        continue-on-error: true
        run: ../../../scripts/terraform-import-existing.sh prod

      - name: Terraform Plan
        working-directory: terraform/environments/prod
        run: terraform plan -var="environment=prod" -var="budget_alert_email=${{ secrets.BUDGET_ALERT_EMAIL }}" -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/prod
        run: terraform apply -var="environment=prod" -var="budget_alert_email=${{ secrets.BUDGET_ALERT_EMAIL }}" -auto-approve tfplan

      - name: Deploy Frontend to S3
        working-directory: terraform/environments/prod
        run: |
          API_URL=$(terraform output -raw api_gateway_url)
          BUCKET=$(terraform output -raw s3_bucket_name)
          CF_DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          echo "API URL: $API_URL"
          echo "Bucket: $BUCKET"
          cp $GITHUB_WORKSPACE/frontend/config.js /tmp/config.js
          sed -i "s|REPLACE_WITH_API_URL|$API_URL|g" /tmp/config.js
          sed -i "s|REPLACE_WITH_ENV|prod|g" /tmp/config.js
          echo "Config after injection:"
          cat /tmp/config.js
          aws s3 cp /tmp/config.js s3://$BUCKET/config.js \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 sync $GITHUB_WORKSPACE/frontend/ s3://$BUCKET/ \
            --exclude "config.js" \
            --delete \
            --cache-control "max-age=300"
          aws cloudfront create-invalidation \
            --distribution-id $CF_DIST_ID \
            --paths "/*"
          echo "Frontend deployed to $(terraform output -raw frontend_url)"

      - name: Get API URL
        id: get-url
        working-directory: terraform/environments/prod
        run: |
          API_URL=$(terraform output -raw api_gateway_url)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

  verify-prod:
    name: Verify Prod
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Smoke Test Prod
        run: |
          ./scripts/smoke-test.sh prod

      - name: Rollback on smoke test failure
        if: failure()
        run: |
          echo "❌ Prod smoke tests failed — rolling back to previous version"
          PREV_VERSION=$(aws lambda list-versions-by-function \
            --function-name deploymentor-prod \
            --query 'Versions[-2].Version' \
            --output text)
          
          if [ -n "$PREV_VERSION" ] && [ "$PREV_VERSION" != "null" ]; then
            echo "🔄 Rolling back to version $PREV_VERSION"
            aws lambda update-alias \
              --function-name deploymentor-prod \
              --name live \
              --function-version "$PREV_VERSION"
            echo "✅ ROLLED BACK to version $PREV_VERSION"
          else
            echo "⚠️ No previous version found — cannot rollback"
          fi
          exit 1

