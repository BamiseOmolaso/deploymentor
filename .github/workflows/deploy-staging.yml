name: Deploy Staging

on:
  workflow_dispatch:
  push:
    tags:
      - 'staging-*'

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging  # GitHub environment for OIDC configuration

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Package Lambda function
        run: |
          zip -r lambda_function.zip src/

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.6'

      - name: Clear any stale Terraform state lock
        run: |
          echo "🔍 Checking for stale state lock..."
          LOCK_EXISTS=$(aws s3 ls s3://deploymentor-terraform-state/deploymentor/staging/terraform.tfstate.tflock 2>/dev/null && echo "EXISTS" || echo "NONE")

          if [ "$LOCK_EXISTS" = "EXISTS" ]; then
            echo "⚠️  Stale lock found — clearing it"
            aws s3 rm s3://deploymentor-terraform-state/deploymentor/staging/terraform.tfstate.tflock
            echo "✅ Lock cleared"
          else
            echo "✅ No stale lock found"
          fi

      - name: Terraform Init
        working-directory: terraform/environments/staging
        run: terraform init -input=false

      - name: Import existing resources (if any)
        working-directory: terraform/environments/staging
        run: |
          LAMBDA_EXISTS=$(aws lambda get-function \
            --function-name deploymentor-staging \
            --query 'Configuration.FunctionName' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$LAMBDA_EXISTS" = "NOT_FOUND" ]; then
            echo "ℹ️ No existing staging resources found — Terraform will create them fresh"
          else
            echo "✅ Existing staging resources found — running import script"
            ../../../scripts/terraform-import-existing.sh staging
          fi

      - name: Terraform Plan
        working-directory: terraform/environments/staging
        run: terraform plan -var="environment=staging" -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/staging
        run: terraform apply -var="environment=staging" -auto-approve tfplan

      - name: Get API URL
        id: get-url
        working-directory: terraform/environments/staging
        run: |
          API_URL=$(terraform output -raw api_gateway_url)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Smoke Test
        run: |
          ./scripts/smoke-test.sh staging

