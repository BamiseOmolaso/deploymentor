name: Deploy Staging

on:
  workflow_dispatch:
  push:
    tags:
      - 'staging-*'

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  verify-main:
    name: Verify Main Ancestry
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify commit exists in main
        run: |
          if git merge-base --is-ancestor HEAD origin/main; then
            echo "✅ Commit is in main branch history"
          else
            echo "❌ Commit is not in main branch history"
            echo "Staging can only deploy code that has been merged to main"
            exit 1
          fi

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify-main
    environment: staging  # GitHub environment for OIDC configuration

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Package Lambda function
        run: |
          echo "📦 Installing dependencies..."
          pip install -r requirements.txt -t package/

          echo "📦 Packaging Lambda with dependencies..."
          cd package
          zip -r ../lambda_function.zip .
          cd ..

          echo "📦 Adding source code..."
          zip -r lambda_function.zip src/

          echo "✅ Package size: $(du -sh lambda_function.zip | cut -f1)"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.6'

      - name: Clear any stale Terraform state lock
        run: |
          echo "🔍 Checking for stale state lock..."
          LOCK_EXISTS=$(aws s3 ls s3://deploymentor-terraform-state/deploymentor/staging/terraform.tfstate.tflock 2>/dev/null && echo "EXISTS" || echo "NONE")

          if [ "$LOCK_EXISTS" = "EXISTS" ]; then
            echo "⚠️  Stale lock found — clearing it"
            aws s3 rm s3://deploymentor-terraform-state/deploymentor/staging/terraform.tfstate.tflock
            echo "✅ Lock cleared"
          else
            echo "✅ No stale lock found"
          fi

      - name: Terraform Init
        working-directory: terraform/environments/staging
        run: terraform init -input=false

      - name: Import existing resources (if any)
        working-directory: terraform/environments/staging
        run: |
          LAMBDA_EXISTS=$(aws lambda get-function \
            --function-name deploymentor-staging \
            --query 'Configuration.FunctionName' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$LAMBDA_EXISTS" = "NOT_FOUND" ]; then
            echo "ℹ️ No existing staging resources found — Terraform will create them fresh"
          else
            echo "✅ Existing staging resources found — running import script"
            ../../../scripts/terraform-import-existing.sh staging
          fi

      - name: Terraform Plan
        working-directory: terraform/environments/staging
        run: terraform plan -var="environment=staging" -var="budget_alert_email=${{ secrets.BUDGET_ALERT_EMAIL }}" -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/staging
        run: terraform apply -var="environment=staging" -var="budget_alert_email=${{ secrets.BUDGET_ALERT_EMAIL }}" -auto-approve tfplan

      - name: Deploy Frontend to S3
        working-directory: terraform/environments/staging
        run: |
          API_URL=$(terraform output -raw api_gateway_url)
          BUCKET=$(terraform output -raw s3_bucket_name)
          CF_DIST_ID=$(terraform output -raw cloudfront_distribution_id)
          echo "API URL: $API_URL"
          echo "Bucket: $BUCKET"
          cp $GITHUB_WORKSPACE/frontend/config.js /tmp/config.js
          sed -i "s|REPLACE_WITH_API_URL|$API_URL|g" /tmp/config.js
          sed -i "s|REPLACE_WITH_ENV|staging|g" /tmp/config.js
          echo "Config after injection:"
          cat /tmp/config.js
          aws s3 cp /tmp/config.js s3://$BUCKET/config.js \
            --cache-control "no-cache, no-store, must-revalidate"
          aws s3 sync $GITHUB_WORKSPACE/frontend/ s3://$BUCKET/ \
            --exclude "config.js" \
            --delete \
            --cache-control "max-age=300"
          aws cloudfront create-invalidation \
            --distribution-id $CF_DIST_ID \
            --paths "/*"
          echo "Frontend deployed to $(terraform output -raw frontend_url)"

      - name: Get API URL
        id: get-url
        working-directory: terraform/environments/staging
        run: |
          API_URL=$(terraform output -raw api_gateway_url)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Smoke Test
        run: |
          ./scripts/smoke-test.sh staging

